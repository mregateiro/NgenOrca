# NgenOrca — nginx reverse proxy with Authelia authentication
#
# Place this file in your nginx sites-enabled/ or conf.d/ directory.
# Adjust server_name, SSL cert paths, and authelia URL to match your setup.

server {
    listen 443 ssl http2;
    server_name ngenorca.nas.local;        # ← Change to your internal domain

    # ── TLS ──────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/ngenorca.nas.local.pem;
    ssl_certificate_key /etc/nginx/ssl/ngenorca.nas.local-key.pem;

    # ── Authelia Auth Endpoint ───────────────────────────────────
    location /authelia {
        internal;
        proxy_pass http://authelia:9091/api/authz/auth-request;

        proxy_set_header X-Original-URL     $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method  $request_method;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $http_host;
        proxy_set_header X-Forwarded-URI    $request_uri;
        proxy_set_header X-Forwarded-For    $remote_addr;
        proxy_set_header Content-Length      "";
        proxy_set_header Connection          "";
    }

    # ── Health Check (no auth) ───────────────────────────────────
    # Docker/nginx healthchecks should not require Authelia login.
    location = /health {
        proxy_pass http://ngenorca:18789;
        proxy_set_header Host $host;
    }

    # ── NgenOrca (with Authelia) ─────────────────────────────────
    location / {
        # Require Authelia authentication
        auth_request        /authelia;
        auth_request_set    $user   $upstream_http_remote_user;
        auth_request_set    $groups $upstream_http_remote_groups;
        auth_request_set    $name   $upstream_http_remote_name;
        auth_request_set    $email  $upstream_http_remote_email;

        # Redirect 401 to Authelia login portal
        error_page 401 =302 https://auth.nas.local/?rd=$scheme://$http_host$request_uri;

        # Proxy to NgenOrca
        proxy_pass http://ngenorca:18789;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;

        # Authenticated user identity → NgenOrca reads these
        proxy_set_header Remote-User       $user;
        proxy_set_header Remote-Name       $name;
        proxy_set_header Remote-Email      $email;
        proxy_set_header Remote-Groups     $groups;

        # WebSocket support (for real-time chat)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;          # Keep WebSocket alive for 24h
        proxy_send_timeout 86400;
    }
}
