# NgenOrca — NAS / Homelab Deployment
#
# Designed for: Synology, QNAP, Unraid, TrueNAS, Raspberry Pi, or any Linux server
# Access via:   WireGuard VPN → nginx → Authelia (2FA) → NgenOrca
#
# Usage:
#   1. Copy deploy/nginx/ngenorca.conf to your nginx sites-enabled
#   2. Add the Authelia access_control rule (see docs/NAS_DEPLOYMENT.md)
#   3. Run from the repo root: docker compose -f docker-compose.nas.yml up -d
#   4. Open /config, save your config, then restart the service
#
# API keys and bot tokens NEVER leave this machine.

services:
  ngenorca:
    build: .
    image: ngenorca/ngenorca:latest
    container_name: ngenorca
    restart: unless-stopped
    command: ["ngenorca", "gateway", "--bind", "0.0.0.0", "--port", "18789", "--config", "/var/lib/ngenorca/config/config.toml"]
    networks:
      - proxy                          # Same network as your nginx + Authelia
    expose:
      - "18789"                        # NOT "ports:" — only visible inside Docker network
    volumes:
      - ngenorca-data:/var/lib/ngenorca
      - ngenorca-config:/var/lib/ngenorca/config
    environment:
      NGENORCA_DATA_DIR: "/var/lib/ngenorca/data"
      NGENORCA_AGENT__WORKSPACE: "/var/lib/ngenorca/workspace"

      # Bootstrap auth for the first run so /config stays protected behind
      # nginx + Authelia even before config.toml exists.
      NGENORCA_GATEWAY__AUTH_MODE: "TrustedProxy"
      NGENORCA_GATEWAY__PROXY_USER_HEADER: "Remote-User"
      NGENORCA_GATEWAY__PROXY_EMAIL_HEADER: "Remote-Email"
      NGENORCA_GATEWAY__PROXY_GROUPS_HEADER: "Remote-Groups"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "2.0"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true                     # The network your nginx/Authelia already use

volumes:
  ngenorca-data:
    driver: local
  ngenorca-config:
    driver: local
